<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>thenovary - Privacy Policy</title>
    <style>
        body {
            font-family: 'Apple SD Gothic Neo', sans-serif;
            text-align: center;
            color: #444;
            background: #f9f9f9;
            padding: 50px 20px;
        }
        .container {
            max-width: 700px;
            background: white;
            margin: 0 auto;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .lang-buttons {
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
        .btn {
            border: 1px solid #ddd;
            background: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            color: #666;
            font-size: 14px;
            transition: 0.3s;
        }
        .btn.active {
            background: #eee;
            font-weight: bold;
            border-color: #bbb;
        }
        .btn:hover {
            background: #f5f5f5;
        }
        h1 {
            color: #5ba16f;
            margin-bottom: 10px;
        }
        #description {
            margin-bottom: 30px;
        }
        .app-list {
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .app-item {
            margin-bottom: 15px;
            font-size: 16px;
            display: flex;
            align-items: center;
        }
        .app-item a {
            color: #333;
            text-decoration: none;
            font-weight: bold;
            margin-left: 10px;
        }
        .app-item a:hover {
            color: #5ba16f;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="lang-buttons">
            <button class="btn" onclick="changeLang('en')" id="btn-en">English</button>
            <button class="btn" onclick="changeLang('de')" id="btn-de">Deutsch</button>
            <button class="btn" onclick="changeLang('pt')" id="btn-pt">Português</button>
            <button class="btn" onclick="changeLang('fr')" id="btn-fr">Français</button>
            <button class="btn" onclick="changeLang('es')" id="btn-es">Español</button>
            <button class="btn" onclick="changeLang('it')" id="btn-it">Italiano</button>
            <button class="btn active" onclick="changeLang('ko')" id="btn-ko">한국어</button>
            <button class="btn" onclick="changeLang('ja')" id="btn-ja">日本語</button>
        </div>

        <h1 id="title">thenovary 🍎🦋</h1>
        <p id="description">사용자의 소중한 정보를 안전하게 보호합니다.</p>

        <div class="app-list">
            <div class="app-item">🍎 <a href="./animal.html" id="link-animal">모여봐요 도감 - 개인정보처리방침</a></div>
            <div class="app-item">📚 <a href="./deepread.html" id="link-deepread">DeepRead - 개인정보처리방침</a></div>
            <div class="app-item">📝 <a href="./pommo.html" id="link-pommo">pommo - 개인정보처리방침</a></div>
        </div>
    </div>

    <script>
        const content = {
            en: {
                title: "thenovary 🍎🦋",
                description: "We safely protect your valuable information.",
                animal: "Nookdex - Privacy Policy",
                deepread: "DeepRead - Privacy Policy",
                pommo: "pommo - Privacy Policy"
            },
            de: {
                title: "thenovary 🍎🦋",
                description: "Wir schützen Ihre wertvollen Informationen sicher.",
                animal: "Nookdex - Datenschutzrichtlinie",
                deepread: "DeepRead - Datenschutzrichtlinie",
                pommo: "pommo - Datenschutzrichtlinie"
            },
            pt: {
                title: "thenovary 🍎🦋",
                description: "Protegemos com segurança suas informações valiosas.",
                animal: "Nookdex - Política de Privacidade",
                deepread: "DeepRead - Política de Privacidade",
                pommo: "pommo - Política de Privacidade"
            },
            fr: {
                title: "thenovary 🍎🦋",
                description: "Nous protégeons en toute sécurité vos précieuses informations.",
                animal: "Nookdex - Politique de confidentialité",
                deepread: "DeepRead - Politique de confidentialité",
                pommo: "pommo - Politique de confidentialité"
            },
            es: {
                title: "thenovary 🍎🦋",
                description: "Protegemos de forma segura su valiosa información.",
                animal: "Nookdex - Política de Privacidad",
                deepread: "DeepRead - Política de Privacidad",
                pommo: "pommo - Política de Privacidad"
            },
            it: {
                title: "thenovary 🍎🦋",
                description: "Proteggiamo in modo sicuro le vostre preziose informazioni.",
                animal: "Nookdex - Informativa sulla privacy",
                deepread: "DeepRead - Informativa sulla privacy",
                pommo: "pommo - Informativa sulla privacy"
            },
            ko: {
                title: "thenovary 🍎🦋",
                description: "사용자의 소중한 정보를 안전하게 보호합니다.",
                animal: "모여봐요 도감 - 개인정보처리방침",
                deepread: "DeepRead - 개인정보처리방침",
                pommo: "pommo - 개인정보처리방침"
            },
            ja: {
                title: "thenovary 🍎🦋",
                description: "お客様の大切な情報を安全に保護します。",
                animal: "あつまれ図鑑 - プライバシーポリシー",
                deepread: "DeepRead - プライバシーポリシー",
                pommo: "pommo - プライバシーポリシー"
            }
        };

        function changeLang(lang) {
            document.getElementById('title').innerText = content[lang].title;
            document.getElementById('description').innerText = content[lang].description;
            document.getElementById('link-animal').innerText = content[lang].animal;
            document.getElementById('link-deepread').innerText = content[lang].deepread;
            document.getElementById('link-pommo').innerText = content[lang].pommo;

            document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
        }
    </script>
</body>
</html>
